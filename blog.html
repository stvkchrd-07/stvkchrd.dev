<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blog | Satvik Chaturvedi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>

    <script src="js/config.local.js"></script>
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="p-4 md:p-8 dark">

    <canvas id="bg-canvas"></canvas>

    <div class="content-wrapper max-w-7xl mx-auto">
        <header class="mb-12 md:mb-20">
            <div class="flex flex-col md:flex-row justify-between md:items-center border-b-2 border-black pb-4 mb-4">
                <a href="./index.html" class="font-black text-5xl sm:text-6xl md:text-7xl tracking-tighter hover:underline">Satvik Chaturvedi</a>
                <nav class="mt-4 md:mt-0">
                    <ul class="flex space-x-2 flex-wrap gap-y-2">
                        <li><a href="https://x.com/StvkChrd" target="_blank" rel="noopener" class="brutalist-hover block border-2 border-black p-3 font-bold" title="X (Twitter)">X</a></li>
                        <li><a href="https://www.linkedin.com/in/stvkchrd" target="_blank" rel="noopener" class="brutalist-hover block border-2 border-black p-3 font-bold" title="LinkedIn">in</a></li>
                        <li><a href="mailto:satvikc73@gmail.com" class="brutalist-hover block border-2 border-black p-3 font-bold" title="Mail">@</a></li>
                        <li><a href="./blog.html" class="brutalist-hover block border-2 border-black px-4 py-3 font-bold" style="background:var(--text-color);color:var(--bg-color)">BLOG</a></li>
                        <li><button onclick="openRao()" class="brutalist-hover block border-2 border-black px-4 py-3 font-bold">RAO AI ✦</button></li>
                        <li><button id="theme-toggle" class="brutalist-hover block border-2 border-black p-3 font-bold" title="Toggle theme" aria-label="Toggle dark/light mode"><span id="theme-icon">☀️</span></button></li>
                    </ul>
                </nav>
            </div>
            <p class="lekh-title text-2xl md:text-3xl font-extrabold mt-2">लेख</p>
        </header>

        <main>
            <section id="blog-posts">
                <div class="space-y-8">
                    <!-- Blog posts loaded by blog.js -->
                </div>
                <div class="h-32 md:h-64 lg:h-96"></div>
            </section>
        </main>

        <footer class="mt-20 pt-8 border-t-2 border-black bg-white/80 backdrop-blur-sm">
            <div class="text-center">
                <p class="mb-2">
                    <span onclick="copyEmailToClipboard('satvikc73@gmail.com')" class="underline hover:no-underline cursor-pointer">satvikc73@gmail.com</span>
                </p>
                <p>© 2025 Satvik Chaturvedi. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- RAO AI Modal (same as index) -->
    <div id="rao-modal">
        <div class="rao-modal-content">
            <div class="rao-header">
                <span class="font-black text-xl">RAO AI ✦</span>
                <button class="rao-close" onclick="closeRao()">&times;</button>
            </div>
            <div id="rao-messages" class="rao-messages">
                <div class="rao-msg rao-msg-ai">hey, what do you want? 👀</div>
            </div>
            <div class="rao-input-row">
                <input id="rao-input" type="text" placeholder="ask rao anything..." autocomplete="off" onkeydown="if(event.key==='Enter') sendRaoMessage()" />
                <button id="rao-send" onclick="sendRaoMessage()">SEND</button>
            </div>
        </div>
    </div>

    <div id="copy-toast"></div>

    <script src="js/utils.js"></script>
    <script src="js/main.js" defer></script>
    <script src="js/blog.js" defer></script>
    <script src="js/rao.js" defer></script>
</body>
</html>
